<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCAT 2026 Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .form-container {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .required {
            color: red;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #764ba2;
        }

        .radio-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            cursor: pointer;
        }

        .radio-group input {
            width: auto;
            margin: 0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .message.loading {
            background: #fff3cd;
            color: #856404;
            display: block;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 NCAT 2026 Registration</h1>
            <p>National Cyber Arena Tournament</p>
        </div>

        <div class="form-container">
            <form id="registrationForm">
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label>Phone Number (WhatsApp preferred) <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" required placeholder="03XXXXXXXXX">
                </div>

                <div class="form-group">
                    <label>How would you like to participate? <span class="required">*</span></label>
                    <div class="radio-group">
                        <label><input type="radio" name="participationType" value="Audience" required> 🎫 Audience</label>
                        <label><input type="radio" name="participationType" value="CTF"> 🏆 CTF</label>
                        <label><input type="radio" name="participationType" value="Gaming"> 🎮 Gaming</label>
                        <label><input type="radio" name="participationType" value="Idea Pitching"> 💡 Idea Pitching</label>
                    </div>
                </div>

                <hr>

                <div class="form-group">
                    <label>Select Category <span class="required">*</span></label>
                    <select id="selectedCategory" name="selectedCategory" required>
                        <option value="">Select Category</option>
                        <option value="Attendee Regular - PKR 2,000">Attendee Regular - PKR 2,000</option>
                        <option value="Attendee Student - PKR 1,200">Attendee Student - PKR 1,200</option>
                        <option value="CTF - PKR 2,500">CTF - PKR 2,500</option>
                        <option value="Gaming PUBG - PKR 2,500">Gaming PUBG - PKR 2,500</option>
                        <option value="Gaming Tekken 8 - PKR 1,500">Gaming Tekken 8 - PKR 1,500</option>
                        <option value="Gaming FIFA - PKR 1,500">Gaming FIFA - PKR 1,500</option>
                        <option value="Idea Pitching - PKR 2,000">Idea Pitching - PKR 2,000</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Payment Method <span class="required">*</span></label>
                    <select id="paymentMethod" name="paymentMethod" required>
                        <option value="">Select</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                        <option value="Jazzcash">Jazzcash</option>
                        <option value="Easypaisa">Easypaisa</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Transaction ID / Reference Number <span class="required">*</span></label>
                    <input type="text" id="transactionId" name="transactionId" required placeholder="Enter transaction ID">
                </div>

                <div class="form-group">
                    <label>Amount Paid (PKR) <span class="required">*</span></label>
                    <input type="number" id="amountPaid" name="amountPaid" required placeholder="e.g., 2000">
                </div>

                <div class="form-group">
                    <label>Name used for payment <span class="required">*</span></label>
                    <input type="text" id="paymentName" name="paymentName" required placeholder="Name on bank account / Jazzcash">
                </div>

                <button type="submit" class="btn" id="submitBtn">✅ Register Now</button>
                <div id="message" class="message"></div>
            </form>
        </div>
    </div>

    <script>
        // YOUR GOOGLE SHEETS WEB APP URL
        const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbyBWJV9m4qe05JVkot_drIoLYM5ZhyTM8wTb3GLqVM-OyO-Wu5dtoPEiwIwBMcF8vm9/exec";
        
        const form = document.getElementById('registrationForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            setTimeout(() => {
                if (messageDiv.className === 'message ' + type) {
                    messageDiv.className = 'message';
                }
            }, 5000);
        }
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Collect form data
            const formData = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                participationType: document.querySelector('input[name="participationType"]:checked')?.value || '',
                selectedCategory: document.getElementById('selectedCategory').value,
                paymentMethod: document.getElementById('paymentMethod').value,
                transactionId: document.getElementById('transactionId').value.trim(),
                amountPaid: document.getElementById('amountPaid').value,
                paymentName: document.getElementById('paymentName').value.trim()
            };
            
            // Basic validation
            if (!formData.fullName || !formData.email || !formData.phone || !formData.participationType) {
                showMessage('Please fill all required fields', 'error');
                return;
            }
            
            showMessage('Submitting registration...', 'loading');
            submitBtn.disabled = true;
            
            try {
                const response = await fetch(GOOGLE_SHEETS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                showMessage('✅ Registration successful! Thank you for registering for NCAT 2026.', 'success');
                form.reset();
                
                // Reset radio buttons
                document.querySelectorAll('input[name="participationType"]').forEach(radio => radio.checked = false);
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Registration failed. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
            }
        });
        
        // Update category options based on participation type
        const categorySelect = document.getElementById('selectedCategory');
        const participationRadios = document.querySelectorAll('input[name="participationType"]');
        
        function updateCategories() {
            const selected = document.querySelector('input[name="participationType"]:checked');
            if (!selected) return;
            
            const type = selected.value;
            let options = [];
            
            if (type === 'Audience') {
                options = [
                    { value: 'Attendee Regular - PKR 2,000', text: 'Attendee Regular - PKR 2,000' },
                    { value: 'Attendee Student - PKR 1,200', text: 'Attendee Student - PKR 1,200' }
                ];
            } else if (type === 'CTF') {
                options = [{ value: 'CTF - PKR 2,500', text: 'CTF - PKR 2,500' }];
            } else if (type === 'Gaming') {
                options = [
                    { value: 'Gaming PUBG - PKR 2,500', text: 'Gaming PUBG - PKR 2,500' },
                    { value: 'Gaming Tekken 8 - PKR 1,500', text: 'Gaming Tekken 8 - PKR 1,500' },
                    { value: 'Gaming FIFA - PKR 1,500', text: 'Gaming FIFA - PKR 1,500' }
                ];
            } else if (type === 'Idea Pitching') {
                options = [{ value: 'Idea Pitching - PKR 2,000', text: 'Idea Pitching - PKR 2,000' }];
            }
            
            categorySelect.innerHTML = '<option value="">Select Category</option>';
            options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt.value;
                option.textContent = opt.text;
                categorySelect.appendChild(option);
            });
        }
        
        participationRadios.forEach(radio => {
            radio.addEventListener('change', updateCategories);
        });
        
        console.log('Form ready!');
    </script>
</body>
</html>
